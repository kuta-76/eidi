<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eidi Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen p-8 text-gray-800">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="bg-emerald-800 p-6 flex justify-between items-center text-white">
                <div>
                    <h1 class="text-2xl font-bold tracking-wide">Admin Dashboard</h1>
                    <p class="text-emerald-200 text-sm mt-1">Eidi Distribution Status</p>
                </div>
                <button onclick="fetchData()"
                    class="bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2 px-5 rounded-lg shadow transition">
                    Refresh
                </button>
            </div>

            <div class="p-0">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100/50 text-gray-500 text-xs uppercase tracking-wider">
                            <th class="p-5 font-semibold border-b">Recipients Name</th>
                            <th class="p-5 font-semibold border-b">Category</th>
                            <th class="p-5 font-semibold text-right border-b">Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="3" class="p-8 text-center text-gray-400">Loading data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const res = await fetch('/admin/data');
                const data = await res.json();

                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-gray-400">No records found.</td></tr>';
                    return;
                }

                data.forEach(user => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-50 transition-colors';

                    const catLabel = user.type === 'bro' ? 'Bro' : 'Friend';
                    const catTheme = user.type === 'bro' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700';

                    const statusHtml = user.opened
                        ? `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-bold ring-1 ring-inset ring-emerald-600/20"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg> Opened</span>`
                        : `<span class="inline-flex px-3 py-1 rounded-full bg-gray-100 text-gray-600 text-xs font-bold ring-1 ring-inset ring-gray-500/10">Pending</span>`;

                    tr.innerHTML = `
                        <td class="p-5 text-sm font-semibold text-gray-900">${user.name}</td>
                        <td class="p-5 text-sm"><span class="px-2 py-1 rounded text-xs font-semibold ${catTheme}">${catLabel}</span></td>
                        <td class="p-5 text-right">${statusHtml}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                document.getElementById('table-body').innerHTML = '<tr><td colspan="3" class="p-8 text-center text-red-400 font-medium">Failed to load data. Ensure server is running.</td></tr>';
            }
        }

        fetchData();
        setInterval(fetchData, 5000); // Polling every 5s
    </script>
</body>

</html>
